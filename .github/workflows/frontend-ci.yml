name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - video-processing-platform/frontend/**
      - .github/workflows/frontend-ci.yml
  push:
    branches: [main]
    paths:
      - video-processing-platform/frontend/**
      - .github/workflows/frontend-ci.yml
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-processing-platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: video-processing-platform/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set Clerk publishable key fallback
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

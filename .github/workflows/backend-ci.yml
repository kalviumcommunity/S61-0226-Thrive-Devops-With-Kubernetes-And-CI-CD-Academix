name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - .github/workflows/backend-ci.ymlgit
  push:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - .github/workflows/backend-ci.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-processing-platform/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: video-processing-platform/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests -v

name: CD - Build, Deploy, Verify Kubernetes Release

on:
  push:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - video-processing-platform/frontend/**
      - video-processing-platform/charts/**
      - video-processing-platform/k8s/**
      - video-processing-platform/scripts/**
      - .github/workflows/deploy-k8s.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment values file
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}
  K8S_NAMESPACE: default
  HELM_RELEASE: video-platform

jobs:
  ci-backend-quality:
    name: CI - Backend Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: video-processing-platform/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: video-processing-platform/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ffmpeg (metadata extraction)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run tests
        run: python -m pytest tests -v

  ci-frontend-quality:
    name: CI - Frontend Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: video-processing-platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Set Clerk publishable key fallback
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Run lint
        run: npm run lint

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

  cd-build-backend-image:
    name: CD - Build & Push Backend Image
    needs: ci-backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Validate Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "DOCKER_HUB_USERNAME and DOCKER_HUB_TOKEN secrets are required."
            exit 1
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-backend:latest

      - name: Export backend image
        id: image
        run: echo "image=${{ secrets.DOCKER_HUB_USERNAME }}/video-backend:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  cd-build-frontend-image:
    name: CD - Build & Push Frontend Image
    needs: ci-frontend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Validate Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "DOCKER_HUB_USERNAME and DOCKER_HUB_TOKEN secrets are required."
            exit 1
          fi

      - name: Set Clerk publishable key fallback
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "CLERK_BUILD_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "CLERK_BUILD_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/frontend
          push: true
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.CLERK_BUILD_KEY }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-frontend:latest

      - name: Export frontend image
        id: image
        run: echo "image=${{ secrets.DOCKER_HUB_USERNAME }}/video-frontend:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  cd-deploy:
    name: CD - Deploy to Kubernetes
    needs:
      - cd-build-backend-image
      - cd-build-frontend-image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve deployment environment
        run: |
          DEPLOY_ENV="${{ github.event.inputs.environment }}"
          if [ -z "$DEPLOY_ENV" ]; then
            DEPLOY_ENV="dev"
          fi
          echo "DEPLOY_ENV=$DEPLOY_ENV" >> "$GITHUB_ENV"
          echo "VALUES_FILE=video-processing-platform/charts/video-processing-platform/values-$DEPLOY_ENV.yaml" >> "$GITHUB_ENV"

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG secret is required."
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          if echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Decoded base64 kubeconfig secret"
          else
            echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
            echo "Using raw kubeconfig secret"
          fi

      - name: Validate deployment inputs
        run: |
          if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ]; then
            echo "DOCKER_HUB_USERNAME secret is required."
            exit 1
          fi

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Values file not found: $VALUES_FILE"
            exit 1
          fi

          kubectl get secret clerk-secrets -n "$K8S_NAMESPACE" >/dev/null
          kubectl get secret mongo-secrets -n "$K8S_NAMESPACE" >/dev/null

      - name: Helm upgrade/install
        run: |
          helm upgrade --install "$HELM_RELEASE" video-processing-platform/charts/video-processing-platform \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f video-processing-platform/charts/video-processing-platform/values.yaml \
            -f "$VALUES_FILE" \
            --set backend.image.repository=${{ secrets.DOCKER_HUB_USERNAME }}/video-backend \
            --set backend.image.tag=${{ env.IMAGE_TAG }} \
            --set frontend.image.repository=${{ secrets.DOCKER_HUB_USERNAME }}/video-frontend \
            --set frontend.image.tag=${{ env.IMAGE_TAG }}

  cd-verify:
    name: CD - Post-Deploy Verification
    needs: cd-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG secret is required."
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          if echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Decoded base64 kubeconfig secret"
          else
            echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
            echo "Using raw kubeconfig secret"
          fi

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${HELM_RELEASE}-video-processing-platform-backend -n "$K8S_NAMESPACE" --timeout=240s
          kubectl rollout status deployment/${HELM_RELEASE}-video-processing-platform-frontend -n "$K8S_NAMESPACE" --timeout=240s

name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - video-processing-platform/frontend/**
      - video-processing-platform/k8s/**
      - .github/workflows/deploy-k8s.yml
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  backend-ci:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-processing-platform/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: video-processing-platform/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests -v

  frontend-ci:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-processing-platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: video-processing-platform/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set Clerk publishable key fallback
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

  build-backend-image:
    name: Build & Push Backend Image
    needs: backend-ci
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-backend:latest

      - name: Export backend image
        id: image
        run: echo "image=${{ secrets.DOCKER_HUB_USERNAME }}/video-backend:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  build-frontend-image:
    name: Build & Push Frontend Image
    needs: frontend-ci
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set Clerk publishable key fallback
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "CLERK_BUILD_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "CLERK_BUILD_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/frontend
          push: true
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.CLERK_BUILD_KEY }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-frontend:latest

      - name: Export frontend image
        id: image
        run: echo "image=${{ secrets.DOCKER_HUB_USERNAME }}/video-frontend:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Kubernetes
    needs:
      - build-backend-image
      - build-frontend-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          if echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Decoded base64 kubeconfig secret"
          else
            echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
            echo "Using raw kubeconfig secret"
          fi

      - name: Apply manifests
        run: |
          kubectl apply -f video-processing-platform/k8s/services.yaml
          kubectl apply -f video-processing-platform/k8s/backend-deployment.yaml
          kubectl apply -f video-processing-platform/k8s/frontend-deployment.yaml

      - name: Update deployment images
        run: |
          kubectl set image deployment/backend backend=${{ needs.build-backend-image.outputs.image }}
          kubectl set image deployment/frontend frontend=${{ needs.build-frontend-image.outputs.image }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/backend --timeout=180s
          kubectl rollout status deployment/frontend --timeout=180s

name: CI - Build, Test, and Docker Image

on:
  pull_request:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - video-processing-platform/frontend/**
      - video-processing-platform/charts/**
      - .github/workflows/ci.yml
  push:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - video-processing-platform/frontend/**
      - video-processing-platform/charts/**
      - .github/workflows/ci.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-image-metadata:
    name: Prepare Image Metadata
    runs-on: ubuntu-latest
    outputs:
      chart_version: ${{ steps.meta.outputs.chart_version }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      ci_image_tag: ${{ steps.meta.outputs.ci_image_tag }}
      image_namespace: ${{ steps.meta.outputs.image_namespace }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          CHART_VERSION=$(grep '^version:' video-processing-platform/charts/video-processing-platform/Chart.yaml | awk '{print $2}')
          SHORT_SHA="${GITHUB_SHA::7}"
          CI_IMAGE_TAG="${CHART_VERSION}-build.${GITHUB_RUN_NUMBER}-sha.${SHORT_SHA}"
          IMAGE_NAMESPACE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"

          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "ci_image_tag=$CI_IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_namespace=$IMAGE_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "backend_image=${IMAGE_NAMESPACE}/video-backend:${CI_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${IMAGE_NAMESPACE}/video-frontend:${CI_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  backend-build:
    name: Backend - Build Stage
    needs: prepare-image-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: video-processing-platform/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: video-processing-platform/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (compile sanity check)
        run: python -m compileall .

  backend-test:
    name: Backend - Test Stage
    needs: backend-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: video-processing-platform/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: video-processing-platform/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Install ffmpeg (for metadata-related tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Lint
        run: flake8 . --select=F

      - name: Run tests
        run: python -m pytest tests -v

  backend-image:
    name: Backend - Docker Image Stage
    needs:
      - prepare-image-metadata
      - backend-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        id: build_backend_image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/backend
          file: ./video-processing-platform/backend/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
          tags: |
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.short_sha }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:latest

      - name: Publish backend image summary
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          {
            echo "### Backend Image Push"
            echo "- Registry: ghcr.io"
            echo "- Image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}"
            echo "- Digest: ${{ steps.build_backend_image.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify backend image push
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: docker buildx imagetools inspect ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}

  frontend-build:
    name: Frontend - Build Stage
    needs: prepare-image-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: video-processing-platform/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: video-processing-platform/frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Configure Clerk fallback for CI build
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

  frontend-test:
    name: Frontend - Test/Check Stage
    needs: frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: video-processing-platform/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: video-processing-platform/frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run quality checks (lint)
        run: npm run lint

  frontend-image:
    name: Frontend - Docker Image Stage
    needs:
      - prepare-image-metadata
      - frontend-test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Clerk build arg fallback
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "CLERK_BUILD_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "CLERK_BUILD_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Build frontend Docker image
        id: build_frontend_image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/frontend
          file: ./video-processing-platform/frontend/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.CLERK_BUILD_KEY }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
          tags: |
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.short_sha }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:latest

      - name: Publish frontend image summary
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          {
            echo "### Frontend Image Push"
            echo "- Registry: ghcr.io"
            echo "- Image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}"
            echo "- Digest: ${{ steps.build_frontend_image.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify frontend image push
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: docker buildx imagetools inspect ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}

  check-deploy-runner:
    name: Deploy - Runner Availability Check
    runs-on: ubuntu-latest
    needs:
      - prepare-image-metadata
      - backend-image
      - frontend-image
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && vars.ENABLE_K8S_DEPLOY == 'true' }}
    outputs:
      deploy_runner_ready: ${{ steps.probe.outputs.deploy_runner_ready }}
    steps:
      - name: Probe selected runner type
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          USE_SELF_HOSTED: ${{ vars.USE_SELF_HOSTED }}
        run: |
          if [ "$USE_SELF_HOSTED" != "true" ]; then
            echo "deploy_runner_ready=true" >> "$GITHUB_OUTPUT"
            echo "Using GitHub-hosted runner for deploy."
            exit 0
          fi

          RUNNERS_JSON=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runners")

          ONLINE_SELF_HOSTED=$(echo "$RUNNERS_JSON" | jq '[.runners[] | select(.status == "online") ] | length')

          if [ "$ONLINE_SELF_HOSTED" -gt 0 ]; then
            echo "deploy_runner_ready=true" >> "$GITHUB_OUTPUT"
            echo "Found $ONLINE_SELF_HOSTED online self-hosted runner(s)."
          else
            echo "deploy_runner_ready=false" >> "$GITHUB_OUTPUT"
            echo "No online self-hosted runners found."
          fi

  deploy-runner-missing:
    name: Deploy - Missing Self-Hosted Runner
    runs-on: ubuntu-latest
    needs: check-deploy-runner
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && vars.ENABLE_K8S_DEPLOY == 'true' && vars.USE_SELF_HOSTED == 'true' && needs.check-deploy-runner.outputs.deploy_runner_ready != 'true' }}
    steps:
      - name: Fail fast with remediation
        run: |
          echo "::error title=No self-hosted runner available::Deploy is configured with USE_SELF_HOSTED=true, but no online self-hosted runner is available for this repository. Start your self-hosted runner service, or set USE_SELF_HOSTED=false to use ubuntu-latest."
          exit 1

  deploy-k8s:
    name: Deploy - Helm Release
    needs:
      - prepare-image-metadata
      - backend-image
      - frontend-image
      - check-deploy-runner

    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && vars.ENABLE_K8S_DEPLOY == 'true' && needs.check-deploy-runner.outputs.deploy_runner_ready == 'true' }}
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}

    timeout-minutes: 20
    env:
      HELM_RELEASE: video-platform
      K8S_NAMESPACE: default
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve deployment environment
        run: |
          DEPLOY_ENV="${{ vars.DEPLOY_ENV }}"
          if [ -z "$DEPLOY_ENV" ]; then
            DEPLOY_ENV="dev"
          fi

          NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          if [ -z "$NAMESPACE" ]; then
            NAMESPACE="$K8S_NAMESPACE"
          fi

          VALUES_FILE="video-processing-platform/charts/video-processing-platform/values-${DEPLOY_ENV}.yaml"

          echo "DEPLOY_ENV=$DEPLOY_ENV" >> "$GITHUB_ENV"
          echo "K8S_NAMESPACE=$NAMESPACE" >> "$GITHUB_ENV"
          echo "VALUES_FILE=$VALUES_FILE" >> "$GITHUB_ENV"

      - name: Configure kubeconfig securely
        run: |
          KCFG="${{ secrets.KUBE_CONFIG }}"
          if [ -z "$KCFG" ]; then
            echo "KUBE_CONFIG secret is required."
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          if echo "$KCFG" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Using base64-encoded kubeconfig from secret"
          else
            printf '%s' "$KCFG" > "$HOME/.kube/config"
            echo "Using raw kubeconfig from secret"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Guard against local-only kubeconfig on hosted runners
        run: |
          SERVER="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          echo "Detected kube API server endpoint: $SERVER"

          if echo "$SERVER" | grep -Eq 'kubernetes\.docker\.internal|localhost|127\.0\.0\.1'; then
            echo "::error title=Local-only kubeconfig endpoint detected::KUBE_CONFIG points to '$SERVER', which is not reachable from GitHub-hosted runners. Use a self-hosted runner with Docker Desktop network access, or provide a remotely reachable Kubernetes API endpoint in KUBE_CONFIG."
            exit 1
          fi

      - name: Validate cluster access and prerequisites
        run: |
          if [ -z "${{ secrets.CLERK_SECRET_KEY }}" ] || [ -z "${{ secrets.MONGO_USERNAME }}" ] || [ -z "${{ secrets.MONGO_PASSWORD }}" ]; then
            echo "CLERK_SECRET_KEY, MONGO_USERNAME, and MONGO_PASSWORD secrets are required."
            exit 1
          fi

          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY secret is required."
            exit 1
          fi

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Values file not found: $VALUES_FILE"
            exit 1
          fi

          kubectl cluster-info
          kubectl get ns "$K8S_NAMESPACE" >/dev/null 2>&1 || true

      - name: Create or update runtime Kubernetes secrets
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: |
          kubectl create secret generic clerk-secrets \
            --namespace "$K8S_NAMESPACE" \
            --from-literal=publishable-key="$CLERK_PUBLISHABLE_KEY" \
            --from-literal=secret-key="$CLERK_SECRET_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic mongo-secrets \
            --namespace "$K8S_NAMESPACE" \
            --from-literal=username="$MONGO_USERNAME" \
            --from-literal=password="$MONGO_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy release with current CI image tags
        run: |
          helm upgrade --install "$HELM_RELEASE" video-processing-platform/charts/video-processing-platform \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            --atomic \
            --wait \
            -f video-processing-platform/charts/video-processing-platform/values.yaml \
            -f "$VALUES_FILE" \
            --set backend.image.repository=${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend \
            --set backend.image.tag=${{ needs.prepare-image-metadata.outputs.ci_image_tag }} \
            --set frontend.image.repository=${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend \
            --set frontend.image.tag=${{ needs.prepare-image-metadata.outputs.ci_image_tag }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${HELM_RELEASE}-video-processing-platform-backend -n "$K8S_NAMESPACE" --timeout=240s
          kubectl rollout status deployment/${HELM_RELEASE}-video-processing-platform-frontend -n "$K8S_NAMESPACE" --timeout=240s

      - name: Publish deployment summary
        run: |
          {
            echo "## CI/CD Deployment Summary"
            echo "- Environment: $DEPLOY_ENV"
            echo "- Namespace: $K8S_NAMESPACE"
            echo "- Helm release: $HELM_RELEASE"
            echo "- Backend image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}"
            echo "- Frontend image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}"
            echo "- Commit: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

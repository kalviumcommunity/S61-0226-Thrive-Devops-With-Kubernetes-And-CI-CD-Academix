apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "video-processing-platform.fullname" . }}-backend-uploads-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backend.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "video-processing-platform.fullname" . }}-backend
  labels:
    app: {{ include "video-processing-platform.name" . }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "video-processing-platform.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "video-processing-platform.name" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: password
            - name: MONGO_URL
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ include "video-processing-platform.fullname" . }}-mongo-service:27017"
            - name: MONGO_DB_NAME
              value: "video_platform"
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: MAX_UPLOAD_BYTES
              value: "1073741824"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "video-processing-platform.fullname" . }}-backend-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "video-processing-platform.fullname" . }}-backend-service
spec:
  selector:
    app: {{ include "video-processing-platform.name" . }}-backend
  ports:
    - protocol: TCP
      port: {{ .Values.backend.service.port }}
      targetPort: 8000
  type: {{ .Values.backend.service.type }}
